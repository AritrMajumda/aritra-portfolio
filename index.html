<script>
(function () {
  document.addEventListener('DOMContentLoaded', () => {

    /* =========================
      POPUPS (hash based)
    ========================= */
    const POPUPS = [
      'modal-profesor',
      'modal-govt-hospital',
      'modal-frozen-earth',
      'modal-giproteatr',
      'modal-extractivism',
      'modal-lectured-moving',
      'modal-lectured-architecture',
      'modal-non-dapibus'
    ];

    const OPEN_CLASS = 'is-open';
    const BODY_LOCK_CLASS = 'no-scroll';

    const getPopupEl = (id) => {
      const el = document.getElementById(id);
      if (!el) return null;
      if (!el.classList.contains('popup__wrapper')) return null;
      return el;
    };

    function closeAllPopups() {
      document
        .querySelectorAll(`.popup__wrapper.${OPEN_CLASS}`)
        .forEach(p => p.classList.remove(OPEN_CLASS));
      document.body.classList.remove(BODY_LOCK_CLASS);
    }

    function openPopupById(id) {
      if (!POPUPS.includes(id)) return;

      const popup = getPopupEl(id);
      if (!popup) return;

      closeAllPopups();
      popup.classList.add(OPEN_CLASS);
      document.body.classList.add(BODY_LOCK_CLASS);
    }

    function openPopupByHash() {
      const id = (window.location.hash || '').replace('#', '');
      if (!id) return;
      openPopupById(id);
    }

    // initial open
    openPopupByHash();

    // react to hash changes
    window.addEventListener('hashchange', openPopupByHash);

    // react to pushState/replaceState changes
    const fireLocationChange = () => window.dispatchEvent(new Event('locationchange'));

    const _pushState = history.pushState;
    history.pushState = function () {
      const ret = _pushState.apply(this, arguments);
      fireLocationChange();
      return ret;
    };

    const _replaceState = history.replaceState;
    history.replaceState = function () {
      const ret = _replaceState.apply(this, arguments);
      fireLocationChange();
      return ret;
    };

    window.addEventListener('locationchange', openPopupByHash);

    // if click on anchor like #modal-..., open popup
    document.addEventListener('click', (e) => {
      const link = e.target.closest('a[href^="#"]');
      if (!link) return;

      const id = (link.getAttribute('href') || '').replace('#', '');
      if (!POPUPS.includes(id)) return;

      setTimeout(() => openPopupById(id), 0);
    });

    // close by button
    document.addEventListener('click', (e) => {
      if (e.target.closest('.popup-close') || e.target.closest('[data-popup-close]')) {
        closeAllPopups();
        history.pushState('', document.title, window.location.pathname + window.location.search);
      }
    });

    // close by overlay click
    document.addEventListener('click', (e) => {
      const openedWrapper = e.target.closest(`.popup__wrapper.${OPEN_CLASS}`);
      if (!openedWrapper) return;

      if (e.target === openedWrapper) {
        closeAllPopups();
        history.pushState('', document.title, window.location.pathname + window.location.search);
      }
    });

    // close by ESC
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeAllPopups();
        history.pushState('', document.title, window.location.pathname + window.location.search);
      }
    });

    /* =========================
      PAGE NAV ACTIVE STATE
    ========================= */
    const NAV_SELECTOR = '.page-nav__anchor-wrp';
    const ACTIVE_CLASS = 'is-active-anchor';
    const TOP_ID = 'top';

    function normalizeIdFromHref(href) {
      if (!href) return '';
      const i = href.indexOf('#');
      if (i === -1) return '';
      return decodeURIComponent(href.slice(i + 1)).trim();
    }

    function initAnchorsNav() {
      const nav = document.querySelector(NAV_SELECTOR);
      if (!nav) return false;

      const links = Array.from(nav.querySelectorAll('a[href*="#"]'));
      if (!links.length) return true;

      const items = links
        .map((a) => {
          const id = normalizeIdFromHref(a.getAttribute('href'));
          if (!id) return null;
          return { id, a };
        })
        .filter(Boolean);

      if (!items.length) return true;

      let sections = items.map(({ id }) => document.getElementById(id));
      let tops = [];

      function computeTops() {
        sections = items.map(({ id }) => document.getElementById(id));
        tops = sections.map((el) => (el ? (el.getBoundingClientRect().top + window.pageYOffset) : null));
      }

      function setActiveById(id) {
        items.forEach(({ id: itemId, a }) => {
          if (itemId === id) a.classList.add(ACTIVE_CLASS);
          else a.classList.remove(ACTIVE_CLASS);
        });
      }

      function getActiveId() {
        const y = window.pageYOffset || 0;

        if (y <= 4) return items.find(x => x.id === TOP_ID)?.id || items[0].id;

        const offset = Math.max(80, Math.round(window.innerHeight * 0.15));
        const probe = y + offset;

        let activeIndex = 0;

        for (let i = 0; i < items.length; i++) {
          const id = items[i].id;
          if (id === TOP_ID) continue;

          const t = tops[i];
          if (typeof t !== 'number') continue;

          if (probe >= t) activeIndex = i;
        }

        return items[activeIndex].id;
      }

      let raf = 0;
      function onScroll() {
        if (raf) return;
        raf = requestAnimationFrame(() => {
          raf = 0;
          setActiveById(getActiveId());
        });
      }

      computeTops();
      setActiveById(getActiveId());

      window.addEventListener('scroll', onScroll, { passive: true });
      window.addEventListener('resize', () => {
        computeTops();
        setActiveById(getActiveId());
      });

      window.addEventListener('load', () => {
        computeTops();
        setActiveById(getActiveId());
      });

      setTimeout(() => {
        computeTops();
        setActiveById(getActiveId());
      }, 600);

      return true;
    }

    function bootAnchorsNav() {
      if (initAnchorsNav()) return;
      let tries = 0;
      const t = setInterval(() => {
        tries += 1;
        if (initAnchorsNav() || tries > 20) clearInterval(t);
      }, 300);
    }

    bootAnchorsNav();

    /* =========================
      NAV GRADIENT BLUR STACK
    ========================= */
    const TARGET_SELECTOR = '.nav__gradient';
    const STACK_CLASS = 'blur-stack';

    const LAYERS = [
      { z: 1, blur: 0.08, m1: '0%',    m2: '12.5%', m3: '25%',   m4: '37.5%' },
      { z: 2, blur: 0.16, m1: '12.5%', m2: '25%',   m3: '37.5%', m4: '50%'   },
      { z: 3, blur: 0.31, m1: '25%',   m2: '37.5%', m3: '50%',   m4: '62.5%' },
      { z: 4, blur: 0.63, m1: '37.5%', m2: '50%',   m3: '62.5%', m4: '75%'   },
      { z: 5, blur: 1.25, m1: '50%',   m2: '62.5%', m3: '75%',   m4: '87.5%' },
      { z: 6, blur: 2.5,  m1: '62.5%', m2: '75%',   m3: '87.5%', m4: '100%'  },
      { z: 7, blur: 5,    m1: '75%',   m2: '87.5%', m3: '100%',  m4: '100%'  },
      { z: 8, blur: 10,   m1: '87.5%', m2: '100%',  m3: '100%',  m4: '100%'  }
    ];

    function buildStack(target) {
      if (!target || target.querySelector(`.${STACK_CLASS}`)) return;

      const stack = document.createElement('div');
      stack.className = STACK_CLASS;

      LAYERS.forEach(cfg => {
        const layer = document.createElement('div');
        layer.className = 'blur-stack__layer';
        layer.style.zIndex = String(cfg.z);
        layer.style.setProperty('--blur', `${cfg.blur}px`);
        layer.style.setProperty('--m1', cfg.m1);
        layer.style.setProperty('--m2', cfg.m2);
        layer.style.setProperty('--m3', cfg.m3);
        layer.style.setProperty('--m4', cfg.m4);
        stack.appendChild(layer);
      });

      target.appendChild(stack);
    }

    function initBlurStacks() {
      document.querySelectorAll(TARGET_SELECTOR).forEach(buildStack);
    }

    initBlurStacks();

    const mo = new MutationObserver(() => initBlurStacks());
    mo.observe(document.documentElement, { childList: true, subtree: true });

  });
})();
</script>

<script>
(function () {
  if (window.__navPreloaderV9) return;
  window.__navPreloaderV9 = true;

  var SHRINK_DELAY = 1000;
  var SHRINK_DUR   = 800;
  var ITEM_STAGGER = 120;

  var TEXT_STAGGER = 35;
  var TEXT_START_DELAY = 120;

  function pickLabelTextNode(label) {
    var el = label.querySelector('[data-pl-text]');
    if (el) return el;

    var candidates = Array.prototype.slice.call(label.querySelectorAll('*'));
    candidates = candidates.filter(function (x) {
      var t = (x.textContent || '').trim();
      return t && !x.querySelector('a, button, input, textarea, select, svg, img, video');
    });

    var best = null;
    var bestLen = 0;

    candidates.forEach(function (x) {
      var len = (x.textContent || '').trim().length;
      if (len > bestLen) { bestLen = len; best = x; }
    });

    if (!best) return null;
    best.setAttribute('data-pl-text', '1');
    return best;
  }

  function wrapTextByChars(el) {
    if (!el) return 0;

    if (el.getAttribute('data-pl-wrapped') === '1') {
      var existing = el.querySelectorAll('.pl-char');
      return existing ? existing.length : 0;
    }

    var text = el.textContent || '';
    el.setAttribute('data-pl-wrapped', '1');
    el.textContent = '';

    var frag = document.createDocumentFragment();
    var count = 0;

    Array.prototype.forEach.call(text, function (ch) {
      if (ch === '\n') {
        frag.appendChild(document.createElement('br'));
        return;
      }

      if (ch === ' ') {
        frag.appendChild(document.createTextNode('\u00A0'));
        return;
      }

      var outer = document.createElement('span');
      outer.className = 'pl-char';

      var inner = document.createElement('span');
      inner.className = 'pl-char__in';
      inner.textContent = ch;

      outer.appendChild(inner);
      frag.appendChild(outer);
      count++;
    });

    el.appendChild(frag);
    return count;
  }

  function applyCharDelays(el) {
    var chars = el ? el.querySelectorAll('.pl-char') : null;
    if (!chars || !chars.length) return 0;

    chars.forEach(function (c, i) {
      c.style.transitionDelay = (i * TEXT_STAGGER) + 'ms';
      var inner = c.querySelector('.pl-char__in');
      if (inner) inner.style.transitionDelay = (i * TEXT_STAGGER) + 'ms';
    });

    return chars.length;
  }

  function start() {
    var body = document.body;
    var label = document.querySelector('.nav__label');
    if (!body || !label) return;

    body.classList.add('preloader-active');

    var textEl = pickLabelTextNode(label);
    wrapTextByChars(textEl);
    applyCharDelays(textEl);

    setTimeout(function () {
      body.classList.add('preloader-text');
    }, TEXT_START_DELAY);

    setTimeout(function () {
      body.classList.add('preloader-shrink');
    }, SHRINK_DELAY);

    setTimeout(function () {
      var items = document.querySelectorAll('.nav__item, .w-nav-menu a');

      body.classList.add('preloader-done');

      items.forEach(function (el, i) {
        el.style.transitionDelay = (i * ITEM_STAGGER) + 'ms';
      });

      var total = (items.length ? (items.length - 1) * ITEM_STAGGER : 0) + 800;

      setTimeout(function () {
        body.classList.add('preloader-finish');
        body.classList.remove('preloader-active'); // курсор вернётся тут же
      }, total);

    }, SHRINK_DELAY + SHRINK_DUR);
  }

  (function wait() {
    if (document.querySelector('.nav__label')) start();
    else requestAnimationFrame(wait);
  })();
})();

<script>
(function () {
  if (window.__heroRevealFinalFixV3) return;
  window.__heroRevealFinalFixV3 = true;

  var START_DELAY = 3000;       // старт через 3с
  var IMG_TO_TEXT_PAUSE = 160;  // пауза между фото и текстом
  var TEXT_TOTAL_MS = 800;      // вся фраза ~0.8s
  var MIN_STAGGER = 10;
  var MAX_STAGGER = 28;

  var NAV_WAIT_MAX = 3500;      // максимум ждём nav на десктопе
  var NAV_POLL_MS = 50;

  function setImportant(el, prop, val) {
    if (!el) return;
    el.style.setProperty(prop, val, 'important');
  }

  function isVisible(el) {
    return !!(el && el.offsetParent !== null);
  }

  function getVisibleInDynItem(sel) {
    var items = document.querySelectorAll('.w-dyn-item');
    for (var i = 0; i < items.length; i++) {
      if (!isVisible(items[i])) continue;
      var el = items[i].querySelector(sel);
      if (el && isVisible(el)) return el;
    }
    return null;
  }

  function getHeroTxt() {
    return getVisibleInDynItem('.main__hero-txt') || document.querySelector('.main__hero-txt');
  }

  function getHeroImg() {
    return getVisibleInDynItem('img.main__hero-img') || document.querySelector('img.main__hero-img');
  }

  function pickBestTextNode(root) {
    if (!root) return null;

    var direct = root.querySelector('[data-hero-text]');
    if (direct) return direct;

    var nodes = Array.prototype.slice.call(root.querySelectorAll('*'));
    nodes = nodes.filter(function (x) {
      var t = (x.textContent || '').trim();
      return t && !x.querySelector('a, button, img, svg, video');
    });

    var best = null, bestLen = 0;
    nodes.forEach(function (x) {
      var len = (x.textContent || '').trim().length;
      if (len > bestLen) { bestLen = len; best = x; }
    });

    if (!best) {
      root.setAttribute('data-hero-text', '1');
      return root;
    }

    best.setAttribute('data-hero-text', '1');
    return best;
  }

  function wrapTextByChars(el) {
    if (!el) return 0;

    if (el.getAttribute('data-hero-wrapped') === '1') {
      var exist = el.querySelectorAll('.pl-char');
      return exist ? exist.length : 0;
    }

    var text = el.textContent || '';
    el.setAttribute('data-hero-wrapped', '1');
    el.textContent = '';

    var frag = document.createDocumentFragment();
    var count = 0;

    Array.prototype.forEach.call(text, function (ch) {
      if (ch === '\n') { frag.appendChild(document.createElement('br')); return; }
      if (ch === ' ') { frag.appendChild(document.createTextNode('\u00A0')); return; }

      var outer = document.createElement('span');
      outer.className = 'pl-char';

      var inner = document.createElement('span');
      inner.className = 'pl-char__in';
      inner.textContent = ch;

      outer.appendChild(inner);
      frag.appendChild(outer);
      count++;
    });

    el.appendChild(frag);
    return count;
  }

  function applyCharDelays(el, staggerMs) {
    var chars = el ? el.querySelectorAll('.pl-char') : null;
    if (!chars || !chars.length) return 0;

    chars.forEach(function (c, i) {
      var d = (i * staggerMs) + 'ms';
      c.style.transitionDelay = d;
      var inner = c.querySelector('.pl-char__in');
      if (inner) inner.style.transitionDelay = d;
    });

    return chars.length;
  }

  function revealImageInline(img) {
    if (!img) return;

    setImportant(img, 'opacity', '1');

    img.style.clipPath = 'inset(0 0 100% 0)';
    img.style.webkitClipPath = 'inset(0 0 100% 0)';

    void img.offsetHeight;

    requestAnimationFrame(function () {
      img.style.clipPath = 'inset(0 0 0% 0)';
      img.style.webkitClipPath = 'inset(0 0 0% 0)';
    });
  }

  function revealText(heroTxt) {
    if (!heroTxt) return;

    setImportant(heroTxt, 'opacity', '1');

    var textEl = pickBestTextNode(heroTxt);
    var charCount = wrapTextByChars(textEl);

    var stagger = Math.floor(TEXT_TOTAL_MS / Math.max(1, charCount));
    stagger = Math.max(MIN_STAGGER, Math.min(MAX_STAGGER, stagger));

    applyCharDelays(textEl, stagger);

    void heroTxt.offsetHeight;

    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        heroTxt.classList.add('is-reveal');
      });
    });
  }

  function isNavReadyDesktop() {
    var nav = document.querySelector('.nav');
    if (!nav) return true;

    var items = Array.prototype.slice.call(
      nav.querySelectorAll('.nav__item, .nav__link, .nav__menu a, .nav a')
    ).filter(function(el){
      var cs = getComputedStyle(el);
      return cs.display !== 'none' && cs.visibility !== 'hidden';
    });

    if (!items.length) return true;

    var ok = 0;
    items.forEach(function(el){
      var cs = getComputedStyle(el);
      var op = parseFloat(cs.opacity || '1');
      var tr = cs.transform;
      if (op > 0.92 && (tr === 'none' || tr === 'matrix(1, 0, 0, 1, 0, 0)')) ok++;
    });

    return ok >= Math.max(1, Math.floor(items.length * 0.6));
  }

  function whenNavReadyThenStart() {
    // на <1200 nav не ждём
    if (window.matchMedia && window.matchMedia('(max-width: 1199px)').matches) {
      start();
      return;
    }

    var t0 = Date.now();

    (function poll(){
      if (isNavReadyDesktop()) {
        start();
        return;
      }
      if (Date.now() - t0 > NAV_WAIT_MAX) {
        start();
        return;
      }
      setTimeout(poll, NAV_POLL_MS);
    })();
  }

  function start() {
    var heroTxt = getHeroTxt();
    var heroImg = getHeroImg();

    if (!heroTxt || !heroImg || !isVisible(heroTxt) || !isVisible(heroImg)) {
      requestAnimationFrame(start);
      return;
    }

    // 1) СНАЧАЛА ФОТО
    revealImageInline(heroImg);

    // 2) ПОТОМ ТЕКСТ
    setTimeout(function () {
      revealText(heroTxt);
    }, IMG_TO_TEXT_PAUSE);
  }

  window.addEventListener('load', function () {
    setTimeout(whenNavReadyThenStart, START_DELAY);
  });

  window.addEventListener('pageshow', function (e) {
    if (e.persisted) setTimeout(whenNavReadyThenStart, START_DELAY);
  });
})();
</script></head><body class="body"><script>window.location.pathname = "/about"</script></body></html>
